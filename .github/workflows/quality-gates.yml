name: V3 Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CloudAssignment.sln

      - name: Build
        run: dotnet build CloudAssignment.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CloudAssignment.sln --configuration Release --no-build

  frontend:
    name: Frontend type-check, tests, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/cloud-assignment-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
